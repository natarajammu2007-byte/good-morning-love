   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning Mine 💜</title>
    <style>
        :root {
            --purple: #9b59b6;
            --blue: #3498db;
            --glass: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, #2c3e50, #000000);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text);
            text-align: center;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        /* Top Info */
        .info-bar {
            position: fixed;
            top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Screens */
        .screen { transition: all 0.5s ease-in-out; }
        .hidden { display: none; opacity: 0; transform: scale(0.8); }

        h1 { font-size: 2.2rem; margin-bottom: 10px; text-shadow: 0 0 15px var(--purple); }
        .subtext { font-size: 1rem; margin-bottom: 30px; opacity: 0.9; }

        /* Hearts */
        .heart {
            font-size: 80px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px rgba(155, 89, 182, 0.5));
            animation: pulse 1.5s infinite;
        }
        .heart:hover { transform: scale(1.2); }
        .heart-blue { filter: drop-shadow(0 0 10px rgba(52, 152, 219, 0.5)); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            margin-bottom: 20px;
        }

        .message-text { font-size: 1.3rem; font-weight: bold; min-height: 60px; display: flex; align-items: center; justify-content: center; }

        button {
            background: var(--purple);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }
        button:active { transform: scale(0.95); }

        /* Final Reveal */
        .final-text {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(to right, #9b59b6, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(155, 89, 182, 0.5);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px #fff); }
            to { filter: drop-shadow(0 0 20px #9b59b6); }
        }

        /* Controls */
        .controls { position: fixed; bottom: 60px; right: 20px; }
        .music-btn { background: rgba(255,255,255,0.2); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

        footer { position: fixed; bottom: 15px; width: 100%; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="info-bar">
        <div id="date"></div>
        <div id="clock" style="font-weight: bold; font-size: 1.2rem;"></div>
    </div>

    <div class="container">
        <div id="screen1" class="screen">
            <h1>Good Morning Mine ☀️💜</h1>
            <p class="subtext">Tap the heart to start your surprise</p>
            <div class="heart" onclick="startSurprise()">💜</div>
            <p style="margin-top:10px; font-size: 0.8rem;">Tap to open 💌</p>
        </div>

        <div id="screen2" class="screen hidden">
            <div class="glass-card">
                <div id="message" class="message-text"></div>
                <button onclick="nextMessage()">Tap again 💌</button>
            </div>
            
            <div id="blue-heart-container" class="hidden" style="margin-top: 20px;">
                <div class="heart heart-blue" onclick="revealFinal()">💙</div>
                <p>One last tap 😘</p>
            </div>
        </div>

        <div id="screen3" class="screen hidden">
            <h1 class="final-text">THANGOPULLA 💜</h1>
        </div>
    </div>

    <div class="controls">
        <button class="music-btn" onclick="toggleMusic()">🎵</button>
    </div>

    <footer>Made with love ❤️</footer>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const messages = [
            "Good morning chellakutyy ☀️💜",
            "Good morning thangopulla 😘",
            "Good morning di kutty ponaa 🥰",
            "Good morning di bangari 💖"
        ];

        // Background Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class FloatingHeart {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = Math.random() * 15 + 5;
                this.speed = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.bezierCurveTo(this.x - this.size, this.y - this.size, this.x - this.size, this.y + this.size/2, this.x, this.y + this.size);
                ctx.bezierCurveTo(this.x + this.size, this.y + this.size/2, this.x + this.size, this.y - this.size, this.x, this.y);
                ctx.fill();
            }
            update() {
                this.y -= this.speed;
                if (this.y < -20) this.reset();
            }
        }

        for(let i=0; i<20; i++) hearts.push(new FloatingHeart());

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Clock & Date
        function updateClock() {
            const now = new Date();
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Logic
        let music = document.getElementById('bgMusic');
        let isMusicPlaying = false;

        function startSurprise() {
            document.getElementById('screen1').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('screen1').style.display = 'none';
                document.getElementById('screen2').classList.remove('hidden');
                nextMessage();
                startMusic();
            }, 500);

            // Show blue heart after 5 seconds
            setTimeout(() => {
                document.getElementById('blue-heart-container').classList.remove('hidden');
            }, 5000);
        }

        function nextMessage() {
            const msgEl = document.getElementById('message');
            msgEl.innerText = messages[Math.floor(Math.random() * messages.length)];
        }

        function revealFinal() {
            document.getElementById('screen2').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('screen2').style.display = 'none';
                document.getElementById('screen3').classList.remove('hidden');
                burstHearts();
            }, 500);
        }

        function startMusic() {
            music.play().catch(() => console.log("Audio needs user interaction first"));
            isMusicPlaying = true;
        }

        function toggleMusic() {
            if(isMusicPlaying) music.pause(); else music.play();
            isMusicPlaying = !isMusicPlaying;
        }

        function burstHearts() {
            for(let i=0; i<50; i++) {
                let h = new FloatingHeart();
                h.y = canvas.height / 2;
                h.x = canvas.width / 2;
                h.speed = (Math.random() - 0.5) * 10;
                h.opacity = 1;
                hearts.push(h);
            }
        }
    </script>
</body>
</html>
